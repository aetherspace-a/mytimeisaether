<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Aether OS | Liquid Glass Interface</title>

    <style>
        /* ==========================================================================
           1. SYSTEM DESIGN TOKENS
           ========================================================================== */
        :root {
            --bg-deep: #020402;
            --accent-green: #30d158;
            --glass-panel: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            --ease-apple: cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ==========================================================================
           2. GLOBAL RESET
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           3. AMBIENT LIQUID ENGINE (Canvas)
           ========================================================================== */
        #liquid-canvas {
            position: fixed; inset: 0; z-index: 0;
            filter: blur(80px); opacity: 0.6;
        }

        /* ==========================================================================
           4. DASHBOARD SPATIAL CONTAINER
           Creates the 3D depth effect.
           ========================================================================== */
        .dashboard-container {
            position: relative; z-index: 10;
            width: 380px;
            perspective: 2000px;
            display: flex; flex-direction: column; gap: 20px;
            transform-style: preserve-3d;
        }

        /* ==========================================================================
           5. THE GLASS MATERIAL
           The core component used for all widgets.
           ========================================================================== */
        .glass-card {
            background: var(--glass-panel);
            backdrop-filter: blur(48px) saturate(240%);
            -webkit-backdrop-filter: blur(48px) saturate(240%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px var(--glass-highlight);
            transition: transform 0.6s var(--ease-apple), box-shadow 0.6s var(--ease-apple);
        }

        /* ==========================================================================
           6. WIDGET: CLOCK & DATE
           ========================================================================== */
        .widget-clock { text-align: center; }
        .clock-date { color: var(--accent-green); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .clock-time { font-size: 88px; font-weight: 200; letter-spacing: -4px; margin: 4px 0; }
        .clock-status { font-size: 14px; opacity: 0.6; display: flex; justify-content: center; gap: 15px; }

        /* ==========================================================================
           7. WIDGET: PROFILE
           ========================================================================== */
        .widget-profile { display: flex; align-items: center; gap: 20px; }
        .avatar-box { width: 72px; height: 72px; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .profile-text h1 { font-size: 18px; font-weight: 600; }
        .profile-text p { font-size: 13px; color: var(--text-sub); margin-top: 2px; }

        /* ==========================================================================
           8. WIDGET: DOCK NAVIGATION
           ========================================================================== */
        .nav-dock { display: flex; flex-direction: column; gap: 12px; }
        .nav-link {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none; color: var(--text-main);
            transition: all 0.4s var(--ease-apple);
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-green);
            transform: translateX(5px);
        }
        .nav-link span { color: var(--accent-green); font-size: 12px; font-weight: 500; }

        /* ==========================================================================
           9. RESPONSIVE LAYER
           ========================================================================== */
        @media (max-width: 480px) {
            .dashboard-container { width: 92%; }
        }
    </style>
</head>
<body>

    <canvas id="liquid-canvas"></canvas>

    <div class="dashboard-container" id="dash">
        
        <section class="glass-card widget-clock">
            <div class="clock-date" id="date-ui">--</div>
            <div class="clock-time" id="time-ui">--:--</div>
            <div class="clock-status">
                <span id="weather-ui">☁️ 24°C</span>
                <span style="color: var(--accent-green)">● Online</span>
            </div>
        </section>

        <section class="glass-card widget-profile">
            <div class="avatar-box">
                <img src="https://cdn.discordapp.com/attachments/1145203205135945768/1510147976176336986/97889-colorful-skyline-boy.png" alt="Aether">
            </div>
            <div class="profile-text">
                <h1>Aether</h1>
                <p>Aviation & Community Builder</p>
            </div>
        </section>

        <nav class="nav-dock">
            <a href="https://discord.gg/WsPMFdJsWp" class="nav-link">Discord Community <span>Join</span></a>
            <a href="https://guns.lol/aether_" class="nav-link">Guns.lol Profile <span>View</span></a>
            <a href="https://avely.me/zeop" class="nav-link">Avely Personal <span>Visit</span></a>
        </nav>
    </div>

    <script>
        // 1. LIQUID BACKGROUND ENGINE
        const canvas = document.getElementById('liquid-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const particles = Array.from({length: 12}, () => ({
            x: Math.random() * 1000,
            y: Math.random() * 1000,
            size: Math.random() * 400 + 200,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4
        }));

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function render() {
            ctx.clearRect(0,0,width,height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                g.addColorStop(0, 'rgba(48, 209, 88, 0.05)');
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(render);
        }
        render();

        // 2. TILT PHYSICS ENGINE
        const dash = document.getElementById('dash');
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            dash.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // 3. SYSTEM CLOCK
        function tick() {
            const n = new Date();
            document.getElementById('time-ui').innerText = n.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-ui').innerText = n.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
        }
        setInterval(tick, 1000); tick();
    </script>
</body>
</html>

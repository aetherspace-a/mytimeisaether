<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether OS | Liquid Glass Interface</title>
    <style>
        /* ==========================================================================
           1. ROOT SYSTEM VARIABLES
           Define the design tokens for the Apple-style aesthetic.
           ========================================================================== */
        :root {
            --bg-deep: #020402;
            --accent-green: #30d158;
            --glass-panel: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            --radius-large: 40px;
            --radius-small: 20px;
        }

        /* ==========================================================================
           2. GLOBAL RESET & BASE LAYOUT
           Ensuring perfect typography and viewport handling.
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           3. BACKGROUND LIQUID ENGINE
           Canvas-based particle system for the "Liquid" atmosphere.
           ========================================================================== */
        .ambient-layer {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a1f10 0%, #020402 70%);
        }
        #liquid-canvas {
            position: absolute; inset: 0;
            z-index: 0; opacity: 0.6;
        }

        /* ==========================================================================
           4. GLASS COMPONENT ARCHITECTURE
           The core of the "Liquid Glass" look: Blur + Saturation + Edge Light.
           ========================================================================== */
        .glass-shell {
            background: var(--glass-panel);
            backdrop-filter: blur(60px) saturate(220%);
            -webkit-backdrop-filter: blur(60px) saturate(220%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-large);
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.5),
                inset 0 1px 1px rgba(255,255,255,0.2);
            padding: 40px;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }

        /* ==========================================================================
           5. DASHBOARD LAYOUT
           Structuring the widgets for hierarchy.
           ========================================================================== */
        .aether-dashboard {
            width: 380px; 
            display: flex; flex-direction: column; gap: 24px;
            perspective: 1200px;
        }

        /* ==========================================================================
           6. CLOCK & STATUS WIDGET
           Minimalist time tracking.
           ========================================================================== */
        .widget-clock { text-align: center; margin-bottom: 10px; }
        .clock-time { font-size: 82px; font-weight: 200; letter-spacing: -4px; margin: 4px 0; }
        .clock-date { color: var(--accent-green); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        /* ==========================================================================
           7. PROFILE WIDGET
           The identity block.
           ========================================================================== */
        .widget-profile {
            display: flex; align-items: center; gap: 20px;
        }
        .avatar {
            width: 72px; height: 72px;
            border-radius: 24px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info h1 { font-size: 20px; font-weight: 600; }
        .profile-info p { font-size: 14px; color: var(--text-sub); margin-top: 2px; }

        /* ==========================================================================
           8. NAVIGATION DOCK
           High-interactive link system.
           ========================================================================== */
        .nav-dock { display: flex; flex-direction: column; gap: 14px; }
        .nav-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none; color: white;
            transition: all 0.4s ease;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-green);
            transform: translateX(5px);
        }
        .nav-item span { color: var(--accent-green); font-size: 12px; }

        /* ==========================================================================
           9. WEATHER MODULE
           Adding utility and intelligence.
           ========================================================================== */
        .weather-row {
            display: flex; justify-content: space-between;
            align-items: center; margin-top: 20px;
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .weather-item { font-size: 13px; color: var(--text-sub); }

    </style>
</head>
<body>

    <div class="ambient-layer"></div>
    <canvas id="liquid-canvas"></canvas>

    <div class="aether-dashboard" id="dashboard">
        
        <div class="glass-shell widget-clock">
            <div class="clock-date" id="date-el">Saturday · May 30</div>
            <div class="clock-time" id="time-el">00:00</div>
            <div class="weather-row">
                <div class="weather-item">☁️ Overcast</div>
                <div class="weather-item">24°C</div>
            </div>
        </div>

        <div class="glass-shell widget-profile">
            <div class="avatar">
                <img src="https://cdn.discordapp.com/attachments/1145203205135945768/1510147976176336986/97889-colorful-skyline-boy.png" alt="Profile">
            </div>
            <div class="profile-info">
                <h1>Aether</h1>
                <p>Aviation & Community Builder</p>
            </div>
        </div>

        <div class="nav-dock">
            <a href="https://discord.gg/WsPMFdJsWp" class="nav-item">Discord Community <span>Join</span></a>
            <a href="https://guns.lol/aether_" class="nav-item">Guns.lol Profile <span>View</span></a>
            <a href="https://avely.me/zeop" class="nav-item">Avely Personal <span>Visit</span></a>
        </div>
    </div>

    <script>
        /* ==========================================================================
           JAVASCRIPT SYSTEM ENGINE
           ========================================================================== */

        // 1. LIQUID BACKGROUND ANIMATION
        const canvas = document.getElementById('liquid-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        const particles = Array.from({length: 12}, () => ({
            x: Math.random() * 1000,
            y: Math.random() * 1000,
            size: Math.random() * 400 + 200,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3
        }));

        function setupCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', setupCanvas);
        setupCanvas();

        function render() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                grad.addColorStop(0, 'rgba(48, 209, 88, 0.05)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(render);
        }
        render();

        // 2. INTERACTIVE TILT EFFECT
        const dash = document.getElementById('dashboard');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            dash.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // 3. SYSTEM CLOCK
        function updateTime() {
            const n = new Date();
            document.getElementById('time-el').innerText = n.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-el').innerText = n.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 4. PERFORMANCE & CLEANUP
        // The dashboard is fully responsive. Using CSS variables allows for 
        // instant thematic shifts if you ever want to change the green to blue.
        console.log("Aether OS Initialized: Liquid Glass Engine Active.");
    </script>
</body>
</html>

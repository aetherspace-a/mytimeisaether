<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Celestial Glass</title>
    <style>
        /* =========================================================
           AETHER OS - DESIGN SYSTEM TOKENS
           Palette: Celestial Midnight (Deep Blues/Indigos)
           =========================================================
        */
        :root {
            --bg-deep: #030409;
            --glass-panel: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: #60a5fa; /* Electric Sky */
            --accent-secondary: #818cf8; /* Deep Violet */
            --text-main: #f8fafc;
            --text-sub: rgba(255, 255, 255, 0.45);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-deep); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* ── THE LIQUID AURORA ENGINE ── */
        .aurora-canvas {
            position: fixed; inset: 0; z-index: -1;
            filter: blur(120px);
        }

        /* ── GLASS ARCHITECTURE ── */
        .glass-ui {
            width: 380px; 
            display: flex; flex-direction: column; gap: 24px;
            perspective: 2000px; /* Essential for 3D depth */
            z-index: 10;
        }

        .glass-box {
            background: var(--glass-panel);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 44px;
            padding: 36px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }

        /* ── CLOCK WIDGET ── */
        .widget-clock { text-align: center; }
        .date { color: var(--accent-glow); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .time { font-size: 82px; font-weight: 200; letter-spacing: -4px; margin-top: 4px; }
        .status { font-size: 13px; opacity: 0.6; margin-top: 8px; }

        /* ── PROFILE WIDGET ── */
        .widget-profile { display: flex; align-items: center; gap: 20px; }
        .avatar { width: 72px; height: 72px; border-radius: 28px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 18px; font-weight: 600; }
        .bio { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        /* ── DOCK NAVIGATION ── */
        .dock { display: flex; flex-direction: column; gap: 14px; }
        .dock-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; border-radius: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04);
            text-decoration: none; color: white;
            transition: all 0.4s var(--ease);
        }
        .dock-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-glow);
            transform: translateY(-2px);
        }

        /* ── MOUSE TILT LOGIC ── */
        #container-layer { transition: transform 0.2s ease-out; }
    </style>
</head>
<body>

    <canvas class="aurora-canvas" id="canvas"></canvas>

    <div class="glass-ui" id="container-layer">
        
        <section class="glass-box widget-clock">
            <div class="date" id="date-ui">Saturday · May 30</div>
            <div class="time" id="time-ui">00:00</div>
            <div class="status">● System Operational</div>
        </section>

        <section class="glass-box widget-profile">
            <div class="avatar"><img src="https://cdn.discordapp.com/attachments/1145203205135945768/1510147976176336986/97889-colorful-skyline-boy.png" alt="Aether"></div>
            <div class="info">
                <div class="name">Aether</div>
                <div class="bio">Aviation & Community Builder</div>
            </div>
        </section>

        <nav class="dock">
            <a href="https://discord.gg/WsPMFdJsWp" class="dock-item">Discord Community <span>Join</span></a>
            <a href="https://guns.lol/aether_" class="dock-item">Guns.lol <span>View</span></a>
            <a href="https://avely.me/zeop" class="dock-item">Avely <span>Visit</span></a>
        </nav>
    </div>

    <script>
        /* AETHER OS CORE ENGINE
           Handles: 
           1. Procedural Aurora Canvas Rendering
           2. Spatial Tilt Interaction
           3. Real-time System Data
        */

        // 1. THE AURORA ENGINE
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    color: i % 2 === 0 ? '#60a5fa' : '#818cf8',
                    size: Math.random() * 400 + 200
                });
            }
        }

        function draw() {
            ctx.clearRect(0,0, window.innerWidth, window.innerHeight);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > window.innerWidth) p.vx *= -1;
                if(p.y < 0 || p.y > window.innerHeight) p.vy *= -1;
                
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                grad.addColorStop(0, p.color + '05');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        // 2. TILT INTERACTION
        const el = document.getElementById('container-layer');
        window.addEventListener('mousemove', e => {
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            el.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // 3. CLOCK ENGINE
        function tick() {
            const n = new Date();
            document.getElementById('time-ui').innerText = n.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-ui').innerText = n.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'});
        }

        // INIT
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        initParticles();
        draw();
        setInterval(tick, 1000);
        tick();
    </script>
</body>
</html>

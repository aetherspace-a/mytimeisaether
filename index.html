<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Aether | Liquid Green</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #030804;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent-green: #34c759;
  --text-main: rgba(255, 255, 255, 0.95);
  --text-sub: rgba(255, 255, 255, 0.5);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;min-height:100vh;
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); color:white;
  display:flex;align-items:center;justify-content:center;
  padding: 20px;
}

.stage { width:100%; max-width:400px; display:flex;flex-direction:column;gap:16px; }

.g-card {
  background: var(--glass);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Clock */
.time-wrap { font-weight: 200; font-size: 56px; letter-spacing: -0.02em; }
.date-txt { font-size: 13px; color: var(--accent-green); font-weight: 500; text-transform: uppercase; }

/* Quote */
#qtxt { min-height: 50px; font-style: italic; opacity: 1; transition: opacity 0.5s ease; }

/* Profile */
.profile { display: flex; align-items: center; gap: 16px; }
.av { width: 60px; height: 60px; border-radius: 20px; overflow: hidden; background: #1a2e1e; }
.av img { width: 100%; height: 100%; object-fit: cover; }

/* Links */
.links { display: flex; flex-direction: column; gap: 12px; }
.lnk {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 20px; border-radius: 20px;
  background: rgba(255,255,255,0.03);
  text-decoration: none; color: white;
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.05);
}
.lnk:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-green); }
.ico { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--accent-green); }
</style>
</head>
<body>

<div class="stage">
  <div class="g-card">
    <div class="date-txt" id="dt">Saturday · May 30</div>
    <div class="time-wrap" id="time">00:00</div>
  </div>

  <div class="g-card profile">
    <div class="av"><img src="https://cdn.discordapp.com/attachments/1145203205135945768/1510147976176336986/97889-colorful-skyline-boy.png" alt="Aether"></div>
    <div>
      <div style="font-weight: 500;">Aether</div>
      <div style="font-size: 12px; color: var(--text-sub);">Aviation & community builder</div>
    </div>
  </div>

  <div class="g-card">
    <div id="qtxt" style="font-size: 14px; line-height: 1.5; color: var(--text-main);">"The sky is not the limit."</div>
    <div id="qauth" style="margin-top:8px; font-size: 10px; color: var(--accent-green); text-transform: uppercase;">— Unknown</div>
  </div>

  <div class="links">
    <a class="lnk" href="https://discord.gg/WsPMFdJsWp" target="_blank">
      <div class="ico">D</div> <div>Discord</div>
    </a>
    <a class="lnk" href="https://guns.lol/aether_" target="_blank">
      <div class="ico">G</div> <div>guns.lol / aether_</div>
    </a>
    <a class="lnk" href="https://avely.me/zeop" target="_blank">
      <div class="ico">A</div> <div>avely.me / zeop</div>
    </a>
  </div>
</div>

<script>
const QUOTES=[
  {t:"The sky is not the limit — it's just the beginning.",a:"Unknown"},
  {t:"To fly is to live. Everything else is just waiting.",a:"Unknown"},
  {t:"Adventure is worthwhile in itself.",a:"Amelia Earhart"}
];

function update() {
  const n = new Date();
  document.getElementById('time').textContent = n.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  document.getElementById('dt').textContent = n.toLocaleDateString([], {weekday: 'long'}) + ' · ' + n.toLocaleDateString([], {month: 'short', day: 'numeric'});
}

let i = 0;
function rotateQuote() {
  const el = document.getElementById('qtxt');
  el.style.opacity = 0;
  setTimeout(() => {
    i = (i + 1) % QUOTES.length;
    el.textContent = `"${QUOTES[i].t}"`;
    document.getElementById('qauth').textContent = `— ${QUOTES[i].a}`;
    el.style.opacity = 1;
  }, 500);
}

setInterval(update, 1000);
setInterval(rotateQuote, 5000);
update();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Premium Experience</title>
    <style>
        :root {
            --accent: #32d74b;
            --bg: #020503;
            --glass-base: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* Animated Fluid Background */
        .ambient-field {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 70% 20%, #062410, #020503);
        }
        .light-orb {
            position: absolute; width: 800px; height: 800px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(120px); opacity: 0.12;
            animation: drift 25s infinite alternate ease-in-out;
        }
        @keyframes drift {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(10%, 10%); }
        }

        /* Glass Card System */
        .glass-container {
            width: 360px; display: flex; flex-direction: column; gap: 20px;
        }
        .glass-panel {
            background: var(--glass-base);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        /* Clock Module */
        .time-header { text-align: center; margin-bottom: 10px; }
        .time { font-size: 72px; font-weight: 200; letter-spacing: -3px; line-height: 1; }
        .greeting { font-size: 14px; opacity: 0.6; margin-bottom: 4px; }
        .progress-container { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 16px; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; }

        /* Profile Section */
        .profile { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 64px; height: 64px; border-radius: 22px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* Link System */
        .link-grid { display: grid; gap: 12px; }
        .btn {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.04); padding: 16px 20px;
            border-radius: 20px; text-decoration: none; color: white;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="ambient-field"><div class="light-orb"></div></div>

    <div class="glass-container">
        <div class="glass-panel time-header">
            <div class="greeting" id="greet">Good Morning</div>
            <div class="time" id="time">00:00</div>
            <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        </div>

        <div class="glass-panel profile">
            <div class="avatar"><img src="https://cdn.discordapp.com/attachments/1145203205135945768/1510147976176336986/97889-colorful-skyline-boy.png" alt="Aether"></div>
            <div>
                <div style="font-weight: 600; font-size: 18px;">Aether</div>
                <div style="font-size: 13px; color: var(--accent);">Online · Aviation Expert</div>
            </div>
        </div>

        <div class="link-grid">
            <a href="https://discord.gg/WsPMFdJsWp" class="btn">Discord Community <span>↗</span></a>
            <a href="https://guns.lol/aether_" class="btn">Guns.lol Profile <span>↗</span></a>
            <a href="https://avely.me/zeop" class="link btn">Avely Personal <span>↗</span></a>
        </div>
    </div>

    <script>
        function refresh() {
            const now = new Date();
            const h = now.getHours();
            
            // Dynamic Greeting
            const greet = h < 12 ? "Good Morning" : h < 18 ? "Good Afternoon" : "Good Evening";
            document.getElementById('greet').innerText = greet;
            
            // Time
            document.getElementById('time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Progress Bar (Seconds)
            document.getElementById('bar').style.width = (now.getSeconds() / 60) * 100 + "%";
        }
        setInterval(refresh, 1000);
        refresh();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Liquid Glass OS</title>
    <style>
        :root {
            --apple-bg: #000000;
            --apple-glass: rgba(255, 255, 255, 0.08);
            --accent-green: #30d158;
            --system-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        * { box-sizing: border-box; cursor: default; }

        body {
            margin: 0; padding: 0; background: var(--apple-bg);
            color: #fff; font-family: var(--system-font);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* ── LIQUID CANVAS LAYER ── */
        #fluidCanvas {
            position: fixed; top: 0; left: 0; z-index: 0;
            width: 100%; height: 100%; pointer-events: none;
        }

        /* ── GLASS ARCHITECTURE ── */
        .glass-shell {
            position: relative; z-index: 1;
            width: 380px; padding: 48px;
            background: var(--apple-glass);
            backdrop-filter: blur(64px) saturate(220%);
            -webkit-backdrop-filter: blur(64px) saturate(220%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.6),
                inset 0 1px 1px rgba(255,255,255,0.2);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .glass-shell:hover { transform: scale(1.01) translateY(-5px); }

        /* ── TYPOGRAPHY HIERARCHY ── */
        .time-display { font-size: 84px; font-weight: 200; letter-spacing: -4px; margin-bottom: 8px; }
        .date-display { font-size: 14px; font-weight: 500; color: var(--accent-green); text-transform: uppercase; letter-spacing: 2px; }
        
        .profile-section { display: flex; align-items: center; gap: 20px; margin: 32px 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 32px; }
        .avatar-frame { width: 72px; height: 72px; border-radius: 24px; overflow: hidden; background: #111; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* ── INTERACTIVE LINKS ── */
        .link-container { display: flex; flex-direction: column; gap: 16px; }
        .btn {
            padding: 20px 24px; border-radius: 22px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.9); text-decoration: none;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.3s ease;
        }
        .btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-green); }
        .btn span { font-size: 12px; color: var(--accent-green); }
    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>

    <div class="glass-shell" id="app">
        <div class="date-display" id="date">Saturday, May 30</div>
        <div class="time-display" id="time">00:00</div>

        <div class="profile-section">
            <div class="avatar-frame">
                <img src="https://cdn.discordapp.com/attachments/1145203205135945768/1510147976176336986/97889-colorful-skyline-boy.png" alt="Aether">
            </div>
            <div>
                <div style="font-size: 20px; font-weight: 600;">Aether</div>
                <div style="font-size: 13px; opacity: 0.5;">Aviation & Community Builder</div>
            </div>
        </div>

        <div class="link-container">
            <a href="#" class="btn">Discord Community <span>01</span></a>
            <a href="#" class="btn">Guns.lol Profile <span>02</span></a>
            <a href="#" class="btn">Avely Personal <span>03</span></a>
        </div>
    </div>

    <script>
        // ── FLUID BACKGROUND ENGINE ──
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 200 + 100;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            draw() {
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                grad.addColorStop(0, 'rgba(48, 209, 88, 0.08)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        for(let i=0; i<5; i++) particles.push(new Particle());
        
        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < -200 || p.x > canvas.width + 200 || p.y < -200 || p.y > canvas.height + 200) p.reset();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // ── SYSTEM CLOCK ──
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Aether</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050505;
  --glass: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent: #5e5ce6; /* Apple-style sophisticated indigo/blue */
  --text-main: rgba(255, 255, 255, 0.95);
  --text-sub: rgba(255, 255, 255, 0.5);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:white;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Atmospheric Background */
.bg-gradient {
  position:fixed;inset:0;z-index:0;
  background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050505 60%);
}

.stage {
  position:relative;z-index:10;
  width:min(380px, 90vw);
  display:flex;flex-direction:column;gap:16px;
}

/* Apple-esque Glass */
.g-card {
  background: var(--glass);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* Typography refinements */
.time-wrap { font-weight: 200; font-size: 64px; letter-spacing: -0.02em; }
.ampm { font-size: 12px; font-weight: 500; color: var(--text-sub); }

.lnk {
  display: flex; align-items: center; gap: 16px;
  padding: 16px; border-radius: 20px;
  background: rgba(255,255,255,0.03);
  text-decoration: none; color: white;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s;
}
.lnk:hover { background: rgba(255,255,255,0.08); transform: scale(1.02); }

.ico {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.1);
}

/* Subtle accent for status */
.s-dot { width: 8px; height: 8px; border-radius: 50%; background: #32d74b; box-shadow: 0 0 10px #32d74b; }
</style>
</head>
<body>
<div class="bg-gradient"></div>

<div class="stage">
  <div class="g-card">
    <div class="time-wrap" id="time">00:00</div>
    <div class="ampm" id="date">Saturday, May 30</div>
  </div>

  <div class="g-card">
    <div style="font-size: 14px; line-height: 1.6; color: var(--text-sub);">
      "The beauty of a thing is not in the object itself, but in the perspective of the beholder."
    </div>
  </div>

  <div class="links">
    <a class="lnk" href="#">
      <div class="ico">D</div>
      <div>
        <div style="font-size: 14px;">Discord Community</div>
        <div style="font-size: 12px; color: var(--text-sub);">Join the flight group</div>
      </div>
    </a>
  </div>
</div>

<script>
function update() {
  const n = new Date();
  document.getElementById('time').textContent = n.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  document.getElementById('date').textContent = n.toLocaleDateString([], {weekday: 'long', month: 'long', day: 'numeric'});
}
setInterval(update, 1000);
update();
</script>
</body>
</html>

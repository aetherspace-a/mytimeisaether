<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Celestial Glass</title>
    
    <style>
        /* ==========================================================================
           1. SYSTEM DESIGN TOKENS (The "Apple" Standard)
           ========================================================================== */
        :root {
            --canvas-bg: #010102;
            --glass-panel: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --accent-glow: #2dd4bf; /* Ethereal Teal */
            --accent-void: #3b82f6; /* Celestial Blue */
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.4);
            
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            --ease-apple: cubic-bezier(0.22, 1, 0.36, 1);
            --radius-xl: 56px;
            --radius-lg: 32px;
        }

        /* ==========================================================================
           2. GLOBAL RESET & BASE LAYOUT
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--canvas-bg);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           3. AMBIENT LIQUID ENGINE (Canvas Container)
           ========================================================================== */
        #liquid-canvas {
            position: fixed; inset: 0; z-index: 0;
            filter: blur(140px); opacity: 0.8;
            pointer-events: none;
        }

        /* ==========================================================================
           4. DASHBOARD SPATIAL CONTAINER
           Creates the "Floating" effect via perspective.
           ========================================================================== */
        .viewport {
            position: relative; z-index: 10;
            width: 420px;
            perspective: 2500px;
            display: flex; flex-direction: column; gap: 24px;
            transform-style: preserve-3d;
        }

        /* ==========================================================================
           5. THE "LIQUID GLASS" COMPONENT
           The defining aesthetic of this build.
           ========================================================================== */
        .glass-shell {
            background: var(--glass-panel);
            backdrop-filter: blur(60px) saturate(280%);
            -webkit-backdrop-filter: blur(60px) saturate(280%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 48px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6),
                inset 0 1px 1px var(--glass-highlight);
            transition: transform 0.8s var(--ease-apple), box-shadow 0.8s var(--ease-apple);
        }

        .glass-shell:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.25);
        }

        /* ==========================================================================
           6. CLOCK WIDGET (Typography-led Design)
           ========================================================================== */
        .widget-clock { text-align: center; }
        .clock-date { 
            color: var(--accent-glow); 
            font-size: 11px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 4px;
        }
        .clock-time { 
            font-size: 96px; font-weight: 200; 
            letter-spacing: -6px; margin: 10px 0; 
            line-height: 0.9;
        }
        .clock-status { font-size: 14px; opacity: 0.5; }

        /* ==========================================================================
           7. PROFILE WIDGET
           ========================================================================== */
        .widget-profile { 
            display: flex; align-items: center; gap: 24px;
            padding: 32px; 
        }
        .avatar-frame { 
            width: 80px; height: 80px; 
            border-radius: 28px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .profile-text h1 { font-size: 22px; font-weight: 600; }
        .profile-text p { font-size: 14px; color: var(--text-sub); margin-top: 4px; }

        /* ==========================================================================
           8. NAVIGATION DOCK
           ========================================================================== */
        .nav-dock { display: flex; flex-direction: column; gap: 16px; }
        .nav-link {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 32px; border-radius: 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none; color: var(--text-main);
            transition: all 0.5s var(--ease-apple);
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-glow);
            transform: translateX(10px);
        }
        .nav-link span { 
            color: var(--accent-glow); 
            font-size: 12px; font-weight: 600; 
            letter-spacing: 1px;
        }

        /* ==========================================================================
           9. INTERNAL ENGINE DOCUMENTATION & UTILITY
           ========================================================================== */
        /* This section contains the CSS logic for the "Aether" micro-interactions.
           We ensure every border, padding, and spacing is mathematically balanced 
           to mirror the human interface guidelines used in professional software. */
        .fade-in { animation: enter 1s var(--ease-apple) forwards; }
        @keyframes enter { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <canvas id="liquid-canvas"></canvas>

    <div class="viewport" id="viewport">
        
        <section class="glass-shell widget-clock fade-in">
            <div class="clock-date" id="date-ui">Saturday · May 30</div>
            <div class="clock-time" id="time-ui">00:00</div>
            <div class="clock-status">System Operational</div>
        </section>

        <section class="glass-shell widget-profile fade-in" style="animation-delay: 0.1s;">
            <div class="avatar-frame">
                <img src="https://cdn.discordapp.com/attachments/1145203205135945768/1510147976176336986/97889-colorful-skyline-boy.png" alt="Profile">
            </div>
            <div class="profile-text">
                <h1>Aether</h1>
                <p>Aviation & Community Builder</p>
            </div>
        </section>

        <nav class="nav-dock fade-in" style="animation-delay: 0.2s;">
            <a href="https://discord.gg/WsPMFdJsWp" class="nav-link">Discord Community <span>JOIN</span></a>
            <a href="https://guns.lol/aether_" class="nav-link">Guns.lol Profile <span>VIEW</span></a>
            <a href="https://avely.me/zeop" class="nav-link">Avely Personal <span>VISIT</span></a>
        </nav>
    </div>

    <script>
        /**
         * AETHER CORE ENGINE
         * 1. Liquid Canvas: Generates the background mesh.
         * 2. Interaction Loop: Handles the tilt physics.
         * 3. Utility: Updates the system clock and date.
         */

        // Engine 1: Aurora Particle System
        const canvas = document.getElementById('liquid-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const blobs = Array.from({length: 12}, () => ({
            x: Math.random() * 2000,
            y: Math.random() * 2000,
            size: Math.random() * 600 + 300,
            speedX: (Math.random() - 0.5) * 0.3,
            speedY: (Math.random() - 0.5) * 0.3,
            color: Math.random() > 0.5 ? '#2dd4bf' : '#3b82f6'
        }));

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function render() {
            ctx.clearRect(0, 0, width, height);
            blobs.forEach(b => {
                b.x += b.speedX; b.y += b.speedY;
                if(b.x < 0 || b.x > width) b.speedX *= -1;
                if(b.y < 0 || b.y > height) b.speedY *= -1;
                
                const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size);
                grad.addColorStop(0, b.color + '06');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(render);
        }

        // Engine 2: Interaction Physics (Tilt)
        const viewport = document.getElementById('viewport');
        window.addEventListener('mousemove', (e) => {
            const dx = (window.innerWidth / 2 - e.clientX) / 50;
            const dy = (window.innerHeight / 2 - e.clientY) / 50;
            viewport.style.transform = `rotateY(${-dx}deg) rotateX(${dy}deg)`;
        });

        // Engine 3: System Utilities
        function tick() {
            const now = new Date();
            document.getElementById('time-ui').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-ui').innerText = now.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'});
        }

        // INIT
        window.addEventListener('resize', resize);
        resize();
        render();
        setInterval(tick, 1000);
        tick();

        /*
           DEVELOPER NOTES:
           - This OS engine uses a modular design. The CSS handles 90% of the UI 
             logic (transforms, filters, filters), while the JS manages 
             real-time assets and input physics.
           - We have achieved the "Apple" aesthetic by prioritizing 
             negative space, typography hierarchy, and organic motion.
        */
        console.log("Aether OS v5.0: System Online. Memory Load: Stable.");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Aether</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#34c759;--g2:#30d158;--g3:rgba(52,199,89,0.85);
  --glass-bg:linear-gradient(158deg,rgba(255,255,255,0.13) 0%,rgba(255,255,255,0.05) 45%,rgba(52,199,89,0.07) 100%);
  --glass-border:rgba(255,255,255,0.16);
  --glass-blur:blur(48px) saturate(200%) brightness(1.06);
  --glass-shadow:0 32px 64px rgba(0,0,0,0.52),0 8px 24px rgba(0,0,0,0.28),0 1px 0 rgba(255,255,255,0.22) inset,0 -1px 0 rgba(0,0,0,0.14) inset;
}
html,body{
  width:100%;height:100%;min-height:100svh;
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#030c05;
  overflow:hidden;
}
body{display:flex;align-items:center;justify-content:center}

/* bg */
.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 130% 90% at 20% 10%,#0b2e14 0%,transparent 60%),
  radial-gradient(ellipse 100% 80% at 80% 80%,#061a0b 0%,transparent 55%),
  #030c05}
.blb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:1}
.b1{width:72vw;height:72vh;top:-18vh;left:-18vw;background:radial-gradient(circle,rgba(52,199,89,0.26) 0%,rgba(20,120,50,0.09) 55%,transparent 100%);animation:fl1 16s ease-in-out infinite}
.b2{width:60vw;height:60vh;bottom:-16vh;right:-14vw;background:radial-gradient(circle,rgba(48,209,88,0.18) 0%,rgba(10,180,60,0.06) 50%,transparent 100%);animation:fl2 20s ease-in-out infinite}
.b3{width:42vw;height:42vh;top:38%;left:28%;background:radial-gradient(circle,rgba(80,240,110,0.11) 0%,transparent 70%);animation:fl3 25s ease-in-out infinite}
@keyframes fl1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,6%) scale(1.08)}}
@keyframes fl2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-4%,-4%) scale(1.1)}}
@keyframes fl3{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.18) translate(3%,-5%);opacity:1}}
.grid{position:fixed;inset:0;z-index:2;
  background-image:linear-gradient(rgba(52,199,89,0.028) 1px,transparent 1px),linear-gradient(90deg,rgba(52,199,89,0.028) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 65% 65% at 50% 50%,black 5%,transparent 100%)}

/* particles */
.pts{position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;background:rgba(52,199,89,.55);animation:pu linear infinite}
@keyframes pu{0%{transform:translateY(110vh) scale(0);opacity:0}6%{opacity:1}93%{opacity:.18}100%{transform:translateY(-8vh) scale(1);opacity:0}}

/* stage */
.stage{
  position:relative;z-index:10;
  width:min(400px,96vw);
  display:flex;flex-direction:column;gap:12px;
  animation:in .95s cubic-bezier(.16,1,.3,1) both;
}
@keyframes in{from{opacity:0;transform:translateY(26px) scale(.95)}to{opacity:1;transform:none}}

/* ── GLASS UTIL ── */
.g-card{
  position:relative;border-radius:26px;
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
  overflow:hidden;
}
.g-card::before{
  content:'';position:absolute;
  top:0;left:14px;right:14px;height:1px;z-index:2;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.6) 30%,rgba(255,255,255,.6) 70%,transparent);
}
.g-card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:1;
  background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 50%,rgba(52,199,89,.04) 100%);
}

/* ── CLOCK CARD ── */
.clock-card{padding:28px 28px 22px;text-align:center}

.date-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;margin-bottom:14px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  position:relative;z-index:3;
}
.d-dot{width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 6px rgba(52,199,89,.9);flex-shrink:0}
.d-txt{font-size:11.5px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.6)}

/* Big time — clean, no gimmicks */
.time-wrap{
  display:flex;align-items:flex-start;justify-content:center;gap:0;
  position:relative;z-index:3;margin-bottom:4px;
}
.digits{
  font-size:clamp(72px,19vw,96px);
  font-weight:200;
  letter-spacing:-.04em;
  line-height:1;
  font-variant-numeric:tabular-nums;
  color:rgba(255,255,255,.97);
  text-shadow:0 0 80px rgba(52,199,89,.28),0 4px 20px rgba(0,0,0,.55);
}
.colon{
  font-size:clamp(60px,15vw,80px);
  font-weight:100;
  color:rgba(52,199,89,.9);
  line-height:1;
  padding:0 3px;
  animation:blk 1s step-end infinite;
  text-shadow:0 0 30px rgba(52,199,89,.6);
}
@keyframes blk{50%{opacity:.08}}
.ampm{
  font-size:13px;font-weight:500;letter-spacing:.1em;
  color:rgba(52,199,89,.8);
  align-self:flex-start;
  margin-top:10px;margin-left:4px;
  background:rgba(52,199,89,.12);border:1px solid rgba(52,199,89,.22);
  border-radius:7px;padding:3px 7px;
  backdrop-filter:blur(8px);
  position:relative;z-index:3;
}

.seconds-bar{
  position:relative;z-index:3;
  width:100%;height:2px;border-radius:2px;
  background:rgba(255,255,255,.07);
  overflow:hidden;margin-top:12px;
}
.seconds-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,rgba(52,199,89,.5),rgba(52,199,89,.9));
  box-shadow:0 0 8px rgba(52,199,89,.5);
  transition:width .95s linear;
}

/* ── QUOTE CARD ── */
.quote-card{padding:20px 24px 18px;position:relative;z-index:3}
.quote-inner{position:relative;z-index:3}
.quote-mark{
  font-family:'Playfair Display',Georgia,serif;
  font-size:52px;font-style:italic;font-weight:400;
  line-height:.6;color:rgba(52,199,89,.35);
  display:block;margin-bottom:4px;
  user-select:none;
}
.quote-text{
  font-family:'Playfair Display',Georgia,serif;
  font-size:14.5px;font-style:italic;font-weight:400;
  color:rgba(255,255,255,.82);
  line-height:1.65;
  display:block;margin-bottom:10px;
  min-height:44px;
  transition:opacity .4s ease;
}
.quote-author{
  font-size:10.5px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(52,199,89,.7);
}
.quote-dots{
  display:flex;gap:5px;margin-top:12px;
}
.q-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.18);
  transition:background .3s;cursor:pointer;
}
.q-dot.active{background:rgba(52,199,89,.8);box-shadow:0 0 5px rgba(52,199,89,.6)}

/* ── PROFILE CARD ── */
.profile-card{
  padding:22px 24px 18px;
  display:flex;align-items:center;gap:16px;
}
.av{
  flex-shrink:0;
  width:58px;height:58px;border-radius:50%;
  padding:2.5px;
  background:conic-gradient(from 0deg,rgba(52,199,89,.9),rgba(100,230,130,.35),rgba(30,165,65,.8),rgba(52,199,89,.9));
  box-shadow:0 0 0 1px rgba(52,199,89,.18),0 8px 28px rgba(52,199,89,.25);
  animation:spin-av 10s linear infinite;
  position:relative;z-index:3;
}
@keyframes spin-av{to{filter:hue-rotate(25deg)}}
.av img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.av-info{flex:1;position:relative;z-index:3}
.av-name{
  font-size:17px;font-weight:300;letter-spacing:-.02em;
  color:rgba(255,255,255,.97);
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.av-badge{
  width:15px;height:15px;border-radius:50%;
  background:var(--g);
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
}
.av-badge svg{width:8px;height:8px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.av-bio{font-size:12px;font-weight:400;color:rgba(255,255,255,.42);line-height:1.55}
.av-bio .g{color:rgba(52,199,89,.8)}
.status-row{display:flex;align-items:center;gap:5px;margin-top:6px}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 6px rgba(52,199,89,.8);animation:pulse .9s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.6;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.s-txt{font-size:10.5px;font-weight:400;letter-spacing:.07em;color:rgba(52,199,89,.7);text-transform:uppercase}

/* ── LINKS ── */
.links{display:flex;flex-direction:column;gap:9px}
.lnk{
  display:flex;align-items:center;gap:12px;
  padding:13px 15px;border-radius:18px;
  text-decoration:none;cursor:pointer;
  transition:transform .2s cubic-bezier(.25,.46,.45,.94),box-shadow .2s;
  position:relative;overflow:hidden;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
}
.lnk:hover{transform:translateY(-2px) scale(1.01)}
.lnk:active{transform:scale(.985)}
.lnk::before{
  content:'';position:absolute;top:0;left:0;right:0;height:44%;
  background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);
  border-radius:18px 18px 0 0;pointer-events:none;z-index:0;
}
.lnk.dc{background:linear-gradient(135deg,rgba(88,101,242,.6) 0%,rgba(71,82,196,.47) 55%,rgba(112,126,255,.43) 100%);border:1px solid rgba(152,165,255,.27);box-shadow:0 4px 20px rgba(88,101,242,.3),0 1px 0 rgba(255,255,255,.17) inset}
.lnk.dc:hover{box-shadow:0 8px 30px rgba(88,101,242,.5)}
.lnk.gn{background:linear-gradient(135deg,rgba(52,199,89,.52) 0%,rgba(30,160,60,.4) 55%,rgba(48,209,88,.35) 100%);border:1px solid rgba(52,199,89,.28);box-shadow:0 4px 18px rgba(52,199,89,.2),0 1px 0 rgba(255,255,255,.16) inset}
.lnk.gn:hover{box-shadow:0 8px 28px rgba(52,199,89,.42)}
.lnk.av{background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,rgba(255,255,255,.06) 55%,rgba(52,199,89,.1) 100%);border:1px solid rgba(255,255,255,.15);box-shadow:0 4px 18px rgba(0,0,0,.2),0 1px 0 rgba(255,255,255,.15) inset}
.lnk.av:hover{box-shadow:0 8px 26px rgba(0,0,0,.32)}
.ico{
  width:36px;height:36px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
  box-shadow:0 2px 8px rgba(0,0,0,.22),0 1px 0 rgba(255,255,255,.18) inset;
}
.ico.id{background:rgba(88,101,242,.52);border:1px solid rgba(152,165,255,.32)}
.ico.ig{background:rgba(52,199,89,.36);border:1px solid rgba(52,199,89,.38)}
.ico.ia{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.ico svg{width:16px;height:16px;fill:rgba(255,255,255,.95)}
.lt{flex:1;position:relative;z-index:1}
.lt .h{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.38);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1px}
.lt .l{display:block;font-size:13.5px;font-weight:400;color:rgba(255,255,255,.93)}
.arr{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);
  font-size:14px;font-weight:300;color:rgba(255,255,255,.4);
  position:relative;z-index:1;
}

.ft{text-align:center;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.15);padding-bottom:2px}
</style>
</head>
<body>

  <div class="g-card profile-card">

        onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#34c759,#20b344)';this.parentElement.innerHTML='<div style=width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:200;color:white>A</div>'"/>

  <!-- LINKS -->
  <div class="links">

<script>
(function(){
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const QUOTES=[
    {t:"The sky is not the limit — it's just the beginning.",a:"Unknown"},
    {t:"Not all those who wander are lost.",a:"J.R.R. Tolkien"},
    {t:"To fly is to live. Everything else is just waiting.",a:"Unknown"},
    {t:"Life is either a daring adventure or nothing at all.",a:"Helen Keller"},
    {t:"The world is a book, and those who do not travel read only one page.",a:"Saint Augustine"},
    {t:"Adventure is worthwhile in itself.",a:"Amelia Earhart"},
    {t:"Once you have tasted flight, you will forever walk the earth with your eyes turned skyward.",a:"Leonardo da Vinci"},
    {t:"Wherever you go, go with all your heart.",a:"Confucius"},
  ];

  let qi=Math.floor(Math.random()*QUOTES.length);
  const qtxt=document.getElementById('qtxt');
  const qauth=document.getElementById('qauth');
  const qdots=document.getElementById('qdots');

  function renderDots(){
    qdots.innerHTML='';
    QUOTES.forEach((_,i)=>{
      const d=document.createElement('div');
      d.className='q-dot'+(i===qi?' active':'');
      d.onclick=()=>{qi=i;showQuote()};
      qdots.appendChild(d);
    });
  }

  function showQuote(){
    qtxt.style.opacity='0';
    setTimeout(()=>{
      qtxt.textContent=QUOTES[qi].t;
      qauth.textContent='— '+QUOTES[qi].a;
      qtxt.style.opacity='1';
      renderDots();
    },350);
  }

  showQuote();
  setInterval(()=>{qi=(qi+1)%QUOTES.length;showQuote()},6000);

  function tick(){
    const n=new Date();
    let h=n.getHours();
    const ap=h>=12?'PM':'AM';
    h=h%12||12;
    document.getElementById('hh').textContent=String(h).padStart(2,'0');
    document.getElementById('mm').textContent=String(n.getMinutes()).padStart(2,'0');
    document.getElementById('ap').textContent=ap;
    document.getElementById('dt').textContent=DAYS[n.getDay()]+' · '+MONS[n.getMonth()]+' '+n.getDate();
    const pct=(n.getSeconds()/60)*100;
    document.getElementById('sfill').style.width=pct+'%';
  }
  tick();setInterval(tick,1000);

  const c=document.getElementById('pts');
  for(let i=0;i<22;i++){
    const o=document.createElement('div');o.className='pt';
    const s=.8+Math.random()*2.2;
    o.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;animation-duration:${11+Math.random()*22}s;animation-delay:${-Math.random()*33}s;opacity:${.15+Math.random()*0.5}`;
    c.appendChild(o);
  }
})();
</script>
